services:
  redis:
    image: redis:7-alpine
    container_name: conf-redis
    restart: unless-stopped
    ports:
      - "6390:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  redisdata:
